modules:
  jira:issuePanel:
    - key: custom-panel
      icon: https://example.com/icon.svg
      title: Custom UI Test
      resource: customFrontend
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: customFrontend
    path: static/frontend
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/custom-ui-test
  name: Custom UI Test App
