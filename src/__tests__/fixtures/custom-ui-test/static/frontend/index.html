<!DOCTYPE html>
<html>
<head><title>Custom UI Test</title></head>
<body>
  <div id="app"></div>
  <script type="module">
    import { invoke, view } from '@forge/bridge';
    const ctx = await view.getContext();
    const data = await invoke('getData', { key: 'test' });
    document.getElementById('app').textContent = JSON.stringify({ ctx, data });
  </script>
</body>
</html>
