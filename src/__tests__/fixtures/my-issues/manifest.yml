modules:
  jira:issuePanel:
    - key: my-issues-panel
      title: My Issues
      function: main
      resolver:
        function: resolver

  function:
    - key: main
      handler: src/index.handler
    - key: resolver
      handler: src/index.resolver

permissions:
  scopes:
    - read:jira-work
    - read:jira-user

app:
  id: ari:cloud:ecosystem::app/my-issues-demo
  name: My Issues
