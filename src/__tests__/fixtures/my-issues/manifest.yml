modules:
  jira:issuePanel:
    - key: my-issues-panel
      resource: main
      resolver:
        function: resolver
      render: native
      title: My Issues
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg

  function:
    - key: resolver
      handler: src/resolver.handler

resources:
  - key: main
    path: src/frontend/index.tsx

permissions:
  scopes:
    - read:jira-work
    - read:jira-user

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/my-issues-demo
  name: My Issues
