modules:
  jira:issuePanel:
    - key: my-panel
      title: Test Panel
      resource: main
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler
    - key: queue-handler
      handler: queue-handler.handler
  consumer:
    - key: my-consumer
      queue: work-queue
      function: queue-handler
resources:
  - key: main
    path: src/ui-app.tsx
app:
  id: ari:cloud:ecosystem::app/test-app
  name: Test Forge App
permissions:
  scopes:
    - read:jira-work
    - write:jira-work
