app:
  id: ari:cloud:ecosystem::app/e2e-custom-field
  name: E2E Custom Field
  runtime:
    name: nodejs22.x

modules:
  jira:customField:
    - key: priority-score
      name: Priority Score
      description: A numeric priority score
      type: number
      value:
        function: resolver
      view:
        resource: score-view
        render: native
        experience:
          - issue-view
      edit:
        resource: score-edit
        render: native
        experience:
          - issue-view
          - issue-create
          - issue-transition

  function:
    - key: resolver
      handler: src/resolvers.handler

resources:
  - key: score-view
    path: src/view.tsx
  - key: score-edit
    path: src/edit.tsx

permissions:
  scopes:
    - read:jira-work
