app:
  id: ari:cloud:ecosystem::app/e2e-customui-bridge
  name: E2E Custom UI Bridge Test

modules:
  jira:issuePanel:
    - key: test-panel
      title: Bridge Test
      resource: static-ui
      resolver:
        function: resolver

  function:
    - key: resolver
      handler: src/resolvers.handler

resources:
  - key: static-ui
    path: static

permissions:
  scopes:
    - read:jira-work
    - read:confluence-space.summary
