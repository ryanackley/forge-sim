app:
  id: ari:cloud:ecosystem::app/e2e-uikit-events
  name: E2E UIKit Events

modules:
  jira:issuePanel:
    - key: events-panel
      resource: main
      resolver:
        function: resolver
      render: native
      title: UIKit Events Test

  function:
    - key: resolver
      handler: src/resolvers.handler

resources:
  - key: main
    path: src/index.tsx

permissions:
  scopes:
    - read:jira-work
